<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>فاتورة — WHITE CLOTHES</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@page { size: 72mm auto; margin: 0mm; }
html,body{ margin:0; padding:0; }
body{
  font-family: Arial, Tahoma, sans-serif;
  font-size:12px;
  line-height:1.35;
  color:#000;
  background:#e9e9e9;
  font-weight:700;
  -webkit-text-stroke: 0.10px #000;
}
*{ box-sizing:border-box; -webkit-print-color-adjust:exact; print-color-adjust:exact; }

/* ── Loading / Error ── */
#loadingScreen,#errorScreen{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  background:#e9e9e9;z-index:999;
  font-family:Arial,sans-serif;
}
#loadingScreen .spinner{
  width:38px;height:38px;border:3px solid rgba(0,0,0,.12);
  border-top-color:#c9a84c;border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
#loadingScreen p{font-size:13px;color:#555;margin:0;}
#errorScreen{display:none;}
#errorScreen .icon{font-size:38px;}
#errorScreen p{font-size:13px;color:#c0392b;text-align:center;max-width:280px;margin:0;}
#errorScreen button{
  margin-top:8px;padding:8px 20px;border:none;border-radius:6px;
  background:#111;color:#fff;font-family:Arial,sans-serif;font-size:12px;cursor:pointer;
}

/* ── Toolbar ── */
#toolbar{
  display:none;align-items:center;justify-content:space-between;
  padding:10px 16px;background:#fff;border-bottom:1px solid #ccc;
  position:sticky;top:0;z-index:100;
}
#toolbar .brand-t{font-weight:900;font-size:14px;letter-spacing:1px;}
#toolbar .btns{display:flex;gap:8px;}
#toolbar button{
  padding:6px 16px;border-radius:6px;border:1px solid #ccc;
  font-family:Arial,sans-serif;font-size:12px;font-weight:700;cursor:pointer;
  background:#fff;color:#111;
}
#toolbar .btn-print{background:#111;color:#fff;border-color:#111;}

/* ── Pages wrap ── */
#receiptsWrap{ padding:16px;display:flex;flex-direction:column;align-items:center;gap:16px; }

/* ── Single page ── */
.page{
  width:68mm;
  margin:0 auto;
  break-inside:avoid;
  background:#fff;
  border-radius:8px;
  box-shadow:0 10px 30px rgba(0,0,0,.18);
  padding:2.5mm 2.5mm;
}
.page-break{ height:0; display:none; break-after:page; page-break-after:always; }

@media print{
  body{ background:transparent!important; padding:0!important; -webkit-text-stroke:0px transparent; }
  #toolbar,#loadingScreen,#errorScreen{ display:none!important; }
  #receiptsWrap{ padding:0!important; gap:0!important; display:block!important; }
  .page{
    box-shadow:none!important; border-radius:0!important;
    margin:0 auto!important; padding:2mm 2mm;
    width:72mm!important;
    page-break-after:always; break-after:page;
    height:auto!important; overflow:visible!important;
  }
  .page:last-child{ page-break-after:avoid; break-after:avoid; }
  .page-break{ display:none!important; height:0!important; }
}

/* ── Header ── */
.topHead{
  display:grid;
  grid-template-columns:1fr 0fr;
  gap:3mm;
  align-items:start;
}
.qrBox{ width:24mm;height:24mm;display:flex;align-items:flex-start;justify-content:flex-start; }
.qrBox canvas,.qrBox img{ width:22mm!important;height:22mm!important;image-rendering:pixelated;display:block; }
.headInfo{ text-align:center; }
.brand{ font-weight:900;letter-spacing:1px;font-size:18px;line-height:1.1; }
.subhead{ margin-top:1mm; }
.subhead .muted{ color:#000;font-weight:700; }
.num{ direction:ltr;unicode-bidi:embed; }
.pm-badge{
  display:inline-block;margin-top:1mm;font-size:11px;font-weight:900;
  border:1px solid #000;border-radius:3px;padding:1px 6px;
}

.hr{ border-top:1px dashed #777;margin:1.5mm 0; }

/* ── Info ── */
.info{ display:grid;grid-template-columns:15mm 1fr;gap:1mm 2mm; }
.lbl{ font-weight:900; }
.val{ white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.val.full{ white-space:normal;overflow:visible;text-overflow:unset;word-break:break-word; }
.phones{ direction:rtl;unicode-bidi:embed; }

/* ── Items ── */
.itemsGridHead,.itemsGridRow{
  display:grid;
  grid-template-columns:1fr 12mm 16mm;
  column-gap:0;
}
.itemsGridHead{
  font-weight:900;
  border-top:1px solid #000;border-bottom:1px solid #000;
  padding:1mm 0.8mm;margin-top:1.5mm;
}
.itemsGridHead > div:nth-child(2){ text-align:center; }
.itemsGridHead > div:nth-child(3){ text-align:left;direction:ltr; }
.itemsGridRow{ padding:1.3mm 0.8mm;border-bottom:1px dotted #bbb; }
.itemsGridRow:last-child{ border-bottom:none; }
.pnameLine{ display:flex;gap:1mm;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.meta{ font-size:11px;color:#000; }
.qcol{ text-align:center;font-weight:900; }
.prcol{ text-align:left;direction:ltr;font-weight:900;white-space:nowrap; }

/* ── Totals ── */
.totals{ margin-top:2mm;border-top:1px solid #000;padding-top:1mm; }
.tline{ display:flex;justify-content:space-between;padding:1mm 0;border-bottom:1px dotted #bbb;font-weight:900; }
.tline:last-child{ border-bottom:none; }
.tline.grand{ border:none;font-size:14px;font-weight:900;margin-top:1mm;padding-top:1mm;border-top:1px solid #000; }

/* ── Footer ── */
.invoice-footer{ padding-top:10px;border-top:1px dashed #777;text-align:center;line-height:1.2;margin-top:2mm; }
.footer-site{ font-size:12px;margin-top:6px;font-weight:900; }
.footer-note{ font-size:12px;margin-top:6px;font-weight:700; }
</style>
</head>
<body>

<div id="loadingScreen">
  <div class="spinner"></div>
  <p>جاري تحميل الفاتورة…</p>
</div>

<div id="errorScreen">
  <div class="icon">⚠️</div>
  <p id="errorMsg">حدث خطأ</p>
  <button onclick="location.reload()">إعادة المحاولة</button>
</div>

<div id="toolbar">
  <span class="brand-t">WHITE CLOTHES</span>
  <div class="btns">
    <button onclick="window.close()">✕ إغلاق</button>
    <button class="btn-print" onclick="window.print()">🖨️ طباعة</button>
  </div>
</div>

<div id="receiptsWrap"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwZ68iM4-HzCpfX3tRrVWzzZQIONDuDO2VKXyKxhRY/exec";
const API_KEY = "123";

function clean(s){ return (s==null?"":String(s)).replace(/[❤♥♡💗💖💘💝💞💟]/g,"").replace(/\s+/g," ").trim(); }
function isEmpty(v){ const s=clean(v||"").toLowerCase(); return !s||s==="لا يوجد"||s==="بدون"||s==="0"||s==="none"||s==="-"; }
function numVal(v){ const n=parseFloat(String(v||"").replace(/[^\d.-]/g,"")); return isNaN(n)?0:n; }
function fmtNum(v){ const n=numVal(v); if(isNaN(n))return String(v||""); return n%1===0?String(Math.round(n)):n.toFixed(2); }
function esc(s){ return clean(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function fmtDate(d){
  var t =clean(d.time ||"");
  var dt=clean(d.date ||"");
  // بعد الـ fix في Apps Script، بيجوا نظيفين
  if(t && dt) return t+"  "+dt;
  if(t)  return t;
  if(dt) return dt;
  return "";
}
function buildMeta(it){
  const sz=clean(it.size||it.Size||it.productSize||it["المقاس"]||"");
  const cl=clean(it.color||it.Color||it.productColor||it["اللون"]||"");
  const det=clean(it.details||it.variant||it.options||it.meta||it.description||"");
  const parts=[];
  if(sz) parts.push("مقاس: "+sz);
  if(cl) parts.push("لون: "+cl);
  return parts.length ? parts.join(" • ") : det;
}

function jsonpFetch(url){
  return new Promise((resolve,reject)=>{
    const cb="cb_"+Math.random().toString(36).slice(2);
    const sc=document.createElement("script");
    let done=false;
    const timer=setTimeout(()=>{ if(done)return; done=true; document.head.removeChild(sc); delete window[cb]; reject(new Error("timeout")); },15000);
    window[cb]=(data)=>{ if(done)return; done=true; clearTimeout(timer); document.head.removeChild(sc); delete window[cb]; resolve(data); };
    sc.onerror=()=>{ if(done)return; done=true; clearTimeout(timer); reject(new Error("script error")); };
    sc.src=url+"&callback="+cb;
    document.head.appendChild(sc);
  });
}

function renderReceipt(order, idx, isLast){
  const pm    = clean(order.paymentMethod||"").toLowerCase();
  const isPaid= pm==="transfer_receipt";
  const isCOD = pm==="cod";
  const pmLabel= isPaid?"✓ تم الدفع مسبقاً": isCOD?"الدفع عند الاستلام":"";

  const p1=isEmpty(order.phone1||order.phone)?"":clean(order.phone1||order.phone||"");
  const p2=isEmpty(order.phone2||order.altPhone)?"":clean(order.phone2||order.altPhone||"");
  const phones=[p1,p2].filter(Boolean).join(" - ");
  const note=isEmpty(order.note)?"":clean(order.note||"");

  const discV  =Math.abs(numVal(order.discount||0));
  const coupon =isEmpty(order.coupon)?"":clean(order.coupon||"");
  const subV   =numVal(order.subtotal||0);
  const shipV  =numVal(order.shipping||0);
  const calcTotal=subV+shipV-discV;

  let items=order.items||[];
  if(typeof items==="string"){ try{ items=JSON.parse(items); }catch(e){ items=[]; } }
  if(!Array.isArray(items)) items=[];

  let itemsHtml="";
  items.forEach((it,i)=>{
    const name=clean(it.name||it.product||it.title||""); if(!name)return;
    const qty=Number(it.qty||it.quantity||1)||1;
    const price=numVal(it.lineTotal||it.price||it.total||0);
    const meta=buildMeta(it);
    const unit=(qty>1&&price>0)?Math.round((price/qty)*100)/100:0;
    itemsHtml+=`
      <div class="itemsGridRow">
        <div>
          <div class="pnameLine"><span>${i+1}.</span><span>${esc(name)}</span></div>
          ${meta?`<div class="meta">${esc(meta)}</div>`:""}
          ${unit>0&&qty>1?`<div class="meta num">${fmtNum(unit)} × ${qty}</div>`:""}
        </div>
        <div class="qcol num">${qty}</div>
        <div class="prcol num">${fmtNum(price)}</div>
      </div>`;
  });

  let totHtml=`
    <div class="tline"><div>الإجمالي</div><div class="num">${fmtNum(subV)}</div></div>
    <div class="tline"><div>مصاريف الشحن</div><div class="num">${fmtNum(shipV)}</div></div>`;
  if(discV>0) totHtml+=`<div class="tline"><div>خصم</div><div class="num">${fmtNum(discV)}</div></div>`;
  if(coupon)  totHtml+=`<div class="tline"><div>كوبون</div><div class="num">${esc(coupon)}</div></div>`;
  totHtml+=`<div class="tline grand"><div>المطلوب</div><div class="num">${isPaid?"0 (تم الدفع)":fmtNum(calcTotal)}</div></div>`;

  const orderId=clean(order.orderId||order.id||"");
  const dtStr=fmtDate(order);

  const div=document.createElement("div");
  div.innerHTML=`
    <div class="page" id="page-${idx}">
      <div class="topHead">
        <div class="headInfo">
          <div class="brand">WHITE CLOTHES</div>
          <div class="subhead">
            <div><b>Order:</b> <span class="num">${esc(orderId)}</span></div>
            <div class="muted">
              <span class="num">${esc(dtStr)}</span>
            </div>
            ${pmLabel?`<div class="pm-badge">${esc(pmLabel)}</div>`:""}
          </div>
        </div>
        <div class="qrBox" id="qr-${idx}"></div>
      </div>

      <div class="hr"></div>

      <div class="info">
        <div class="lbl">الاسم:</div>
        <div class="val">${esc(clean(order.customer||order.name||""))}</div>
        ${phones?`<div class="lbl">موبايل:</div><div class="val phones">${esc(phones)}</div>`:""}
        <div class="lbl">المحافظة:</div>
        <div class="val">${esc(clean(order.city||""))}</div>
        <div class="lbl">العنوان:</div>
        <div class="val full">${esc(clean(order.address||""))}</div>
        ${note?`<div class="lbl">ملاحظة:</div><div class="val full">${esc(note)}</div>`:""}
      </div>

      <div class="itemsGridHead">
        <div>الصنف</div><div>الكميه</div><div>السعر</div>
      </div>
      ${itemsHtml}

      <div class="totals">${totHtml}</div>

      <div class="invoice-footer">
        <div class="footer-site">www.white-clothes.com</div>
        <div class="footer-note">في حالة عدم الاستلام يتم دفع مصاريف الشحن فقط.</div>
      </div>
    </div>
    ${!isLast?'<div class="page-break"></div>':""}
  `;
  document.getElementById("receiptsWrap").appendChild(div);

  try{
    if(typeof QRCode!=="undefined"&&orderId){
      new QRCode(document.getElementById("qr-"+idx),{
        text:orderId,width:88,height:88,correctLevel:QRCode.CorrectLevel.M
      });
    }
  }catch(e){}
}

async function main(){
  const params  =new URLSearchParams(location.search);
  const orderId =(params.get("orderId")||"").trim();
  const idsRaw  =(params.get("ids")||"").trim();

  function showError(msg){
    document.getElementById("loadingScreen").style.display="none";
    const es=document.getElementById("errorScreen");
    es.style.display="flex";
    document.getElementById("errorMsg").textContent=msg;
  }

  if(!orderId&&!idsRaw){ showError("مفيش orderId في الـ URL"); return; }

  try{
    let orders=[];
    if(orderId){
      const url=`${API_URL}?action=getOrderData&orderId=${encodeURIComponent(orderId)}&key=${API_KEY}&_t=${Date.now()}`;
      const res=await jsonpFetch(url);
      if(!res?.ok) throw new Error(res?.error||"Order not found");
      orders=[res.order];
    } else {
      const ids=idsRaw.split(",").map(s=>s.trim()).filter(Boolean);
      // نجيب الفواتير على دفعات عشان مانضغطش على الـ API
      const CHUNK = 5;
      const results = [];
      for(let i=0; i<ids.length; i+=CHUNK){
        const chunk = ids.slice(i, i+CHUNK);
        const chunkResults = await Promise.all(chunk.map(id=>{
          const url=`${API_URL}?action=getOrderData&orderId=${encodeURIComponent(id)}&key=${API_KEY}&_t=${Date.now()}`;
          return jsonpFetch(url).then(r=>r?.ok?r.order:null).catch(()=>null);
        }));
        results.push(...chunkResults);
        if(i+CHUNK < ids.length) await new Promise(res=>setTimeout(res,300)); // فاصل 300ms بين الـ chunks
      }
      orders=results.filter(Boolean);
    }

    if(!orders.length) throw new Error("مش لاقي أي أوردر");

    orders.forEach((o,i)=>renderReceipt(o,i,i===orders.length-1));

    document.getElementById("loadingScreen").style.display="none";
    // لو شغال جوه iframe — اخفي التولبار الداخلي
    const inIframe = window.self !== window.top;
    document.getElementById("toolbar").style.display = inIframe ? "none" : "flex";

    // ✅ مفيش auto print

  }catch(err){
    showError("خطأ: "+err.message);
  }
}

main();
</script>
</body>
</html>
